<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="20%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <!-- Logo gradient -->
    <radialGradient id="lg" cx="38%" cy="30%" r="75%">
      <stop offset="0%"   stop-color="#FFF8CC"/>
      <stop offset="28%"  stop-color="#F5C518"/>
      <stop offset="62%"  stop-color="#D4920E"/>
      <stop offset="100%" stop-color="#8A5500"/>
    </radialGradient>
    <mask id="lm">
      <rect width="128" height="128" fill="white"/>
      <path d="M73 20 L48 64 H66 L58 108 L82 60 H65 Z" fill="black"/>
    </mask>
    <!-- Glow effect -->
    <radialGradient id="glow" cx="22%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#f5e642" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5e642" stop-opacity="0"/>
    </radialGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Left accent line -->
  <rect x="0" y="0" width="5" height="630" fill="#f5e642"/>

  <!-- Bottom accent line -->
  <rect x="0" y="610" width="1200" height="4" fill="#f5e642" opacity="0.3"/>

  <!-- Logo mark (scaled 2.2×) -->
  <g transform="translate(80, 235) scale(2.2)">
    <circle cx="64" cy="64" r="64" fill="#070400"/>
    <circle cx="64" cy="64" r="56" fill="url(#lg)" mask="url(#lm)"/>
    <path d="M73 20 L48 64 H66 L58 108 L82 60 H65 Z" fill="#070400"/>
    <circle cx="64" cy="64" r="62" stroke="#F5C518" stroke-width="1.5" stroke-opacity="0.35" fill="none"/>
  </g>

  <!-- Tag line above title -->
  <text x="390" y="220" font-family="'Courier New', monospace" font-size="20" font-weight="700"
        letter-spacing="6" fill="#f5e642" opacity="0.9">⚡ ENERGY TO EARN</text>

  <!-- Main title -->
  <text x="388" y="310" font-family="Georgia, serif" font-size="86" font-weight="700"
        fill="#ffffff" letter-spacing="-2">$WATT</text>
  <text x="388" y="390" font-family="Georgia, serif" font-size="86" font-weight="700"
        fill="#f5e642" letter-spacing="-2">PROTOCOL</text>

  <!-- Description -->
  <text x="390" y="450" font-family="'Inter', Arial, sans-serif" font-size="22"
        fill="#888888" letter-spacing="0.5">A decentralized protocol rewarding renewable</text>
  <text x="390" y="480" font-family="'Inter', Arial, sans-serif" font-size="22"
        fill="#888888" letter-spacing="0.5">energy generation worldwide.</text>

  <!-- Bottom tag -->
  <text x="390" y="560" font-family="'Courier New', monospace" font-size="16"
        fill="#444444" letter-spacing="3">BORN IN AFRICA · BUILT FOR THE WORLD</text>

  <!-- Corner decoration — dots -->
  <circle cx="1140" cy="80"  r="3" fill="#f5e642" opacity="0.4"/>
  <circle cx="1160" cy="80"  r="3" fill="#f5e642" opacity="0.2"/>
  <circle cx="1140" cy="100" r="3" fill="#f5e642" opacity="0.2"/>
  <circle cx="1160" cy="100" r="3" fill="#f5e642" opacity="0.1"/>

  <!-- Decorative circle (right side) -->
  <circle cx="1100" cy="315" r="200" stroke="#f5e642" stroke-width="1" stroke-opacity="0.06" fill="none"/>
  <circle cx="1100" cy="315" r="150" stroke="#f5e642" stroke-width="1" stroke-opacity="0.04" fill="none"/>
  <circle cx="1100" cy="315" r="100" stroke="#f5e642" stroke-width="1" stroke-opacity="0.06" fill="none"/>
</svg>
