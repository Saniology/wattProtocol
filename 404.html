<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found · $WATT Protocol</title>
<link rel="stylesheet" href="shared.css">
<style>
.err-wrap {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
  position: relative;
  overflow: hidden;
}
.err-glow {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(245,230,66,0.05) 0%, transparent 70%);
  pointer-events: none;
}
.err-code {
  font-family: var(--font-display);
  font-size: clamp(120px, 20vw, 220px);
  line-height: 0.85;
  color: var(--yellow);
  opacity: 0.15;
  position: absolute;
  user-select: none;
  pointer-events: none;
}
.err-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--yellow);
  margin-bottom: 20px;
  position: relative;
}
.err-title {
  font-family: var(--font-display);
  font-size: clamp(48px, 8vw, 96px);
  line-height: 0.9;
  margin-bottom: 20px;
  position: relative;
}
.err-sub {
  font-size: 16px;
  color: var(--gray5);
  max-width: 440px;
  line-height: 1.8;
  margin-bottom: 40px;
  position: relative;
}
.err-actions {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
  position: relative;
}
.err-btn-primary {
  background: var(--yellow);
  color: var(--black);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 14px 28px;
  text-decoration: none;
  transition: background 0.2s;
}
.err-btn-primary:hover { background: #ffe100; }
.err-btn-secondary {
  background: none;
  border: 1px solid var(--border);
  color: var(--gray5);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 14px 28px;
  text-decoration: none;
  transition: border-color 0.2s, color 0.2s;
}
.err-btn-secondary:hover { border-color: var(--yellow); color: var(--yellow); }
</style>
</head>
<body>
<div class="err-wrap">
  <div class="err-glow"></div>
  <div class="err-code">404</div>
  <div class="err-tag">⚡ Error 404</div>
  <h1 class="err-title">PAGE<br><span style="color:var(--yellow)">NOT FOUND.</span></h1>
  <p class="err-sub">This page doesn't exist — it may have been moved or the link is wrong. The energy keeps flowing, though.</p>
  <div class="err-actions">
    <a href="index.html" class="err-btn-primary">← Back to Home</a>
    <a href="index.html#waitlist" class="err-btn-secondary">Join Waitlist</a>
  </div>
</div>
<script src="shared.js"></script>
</body>
</html>
